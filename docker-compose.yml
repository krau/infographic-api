services:
  infographic-api:
    image: ghcr.io/krau/infographic-api:latest
    container_name: infographic-api
    ports:
      - "38397:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      # Uncomment and set your authentication token
      # - AUTH_TOKEN=your-secret-token
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

# For local development with build
# Uncomment below and comment out the image line above
#    build:
#      context: .
#      dockerfile: Dockerfile
